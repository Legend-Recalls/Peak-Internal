name: Build peak.dll

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Upload peak.dll
      uses: actions/upload-artifact@v4
      with:
        name: peak-dll
        path: peak.dll
